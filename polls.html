<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polls — NISER Mess Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.polls-wrap{flex:1;padding:24px;max-width:860px;margin:0 auto;width:100%;}
.poll-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);transition:box-shadow 0.2s;position:relative;overflow:hidden;}
.poll-card.highlighted{box-shadow:0 0 0 3px var(--accent2),var(--shadow2);}
.poll-card-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.poll-card-sub{font-size:12px;color:var(--muted2);margin-bottom:14px;}
.poll-option{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.poll-option-btn{flex-shrink:0;background:var(--bg3);border:1.5px solid var(--border2);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted2);cursor:pointer;transition:all 0.15s;min-width:100px;}
.poll-option-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.poll-option-btn.voted{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.poll-bar-outer{flex:1;height:18px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.poll-bar-inner{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 0.5s;border-radius:5px;}
.poll-pct{font-size:11px;font-weight:700;color:var(--muted2);width:36px;text-align:right;}
.poll-total-note{font-size:11px;color:var(--muted);margin-top:8px;}
.poll-card-footer{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.polls-section-title{font-size:18px;font-weight:800;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px;}
.poll-share-btn{background:none;border:1.5px solid var(--border2);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--muted2);cursor:pointer;transition:all 0.15s;}
.poll-share-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.create-poll-card{background:var(--bg2);border:2px dashed var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:18px;}
.create-poll-card.open{border-style:solid;border-color:var(--accent2);}
.create-poll-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.create-poll-toggle{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.create-poll-body{margin-top:18px;}
.option-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.option-row input{flex:1;}
.remove-opt-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.add-opt-btn{background:var(--bg3);border:1.5px solid var(--border2);border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted2);cursor:pointer;margin-top:4px;}
.add-opt-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.poll-countdown-label{font-size:11px;color:var(--accent2);font-weight:700;margin-top:6px;}
.poll-closed-badge{font-size:10px;background:rgba(192,57,43,0.1);color:var(--red);padding:2px 8px;border-radius:5px;font-weight:700;margin-left:8px;}
.guest-vote-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px;}
/* Pie chart */
.poll-pie-wrap{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.poll-pie-title{font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:8px;}
.pie-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.pie-leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted2);}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* Remark stamp */
.poll-remark-stamp{position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:0.05em;border:2px solid;transform:rotate(2deg);opacity:0.9;pointer-events:none;}
.remark-accepted{background:rgba(46,125,80,0.12);color:var(--green);border-color:var(--green);}
.remark-rejected{background:rgba(192,57,43,0.1);color:var(--red);border-color:var(--red);}
/* Already voted banner */
.already-voted-note{background:rgba(124,92,191,0.08);border:1px solid rgba(124,92,191,0.2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--accent2);font-weight:700;margin-bottom:10px;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header class="site-header" id="site-header"></header>

<div class="section-hero">
  <h1>📊 Community Polls</h1>
  <p>Vote on menu items and participate in mess-related polls. No login needed to vote!</p>
</div>

<div class="polls-wrap">
  <div class="polls-section-title">✏️ Community Polls <span style="font-size:12px;color:var(--muted2);font-weight:500;">(created by students)</span></div>

  <div class="create-poll-card" id="create-poll-card">
    <div class="create-poll-header" onclick="toggleCreateForm()">
      <div>
        <div style="font-size:14px;font-weight:800;">➕ Create a Poll</div>
        <div style="font-size:12px;color:var(--muted2);margin-top:2px;">Ask the community anything about the mess!</div>
      </div>
      <button class="create-poll-toggle" id="create-poll-toggle-btn">Create Poll</button>
    </div>
    <div class="create-poll-body" id="create-poll-body" style="display:none;">
      <div class="form-group"><label class="form-label">Question *</label>
        <input class="form-input" type="text" id="cp-question" placeholder="e.g. Should the mess add more South Indian items?"></div>
      <div class="form-group"><label class="form-label">Description <span style="color:var(--muted);font-size:10px;">(optional)</span></label>
        <input class="form-input" type="text" id="cp-desc" placeholder="Add more context…"></div>
      <div class="form-group"><label class="form-label">Options * <span style="color:var(--muted);font-size:10px;">(2–6 options)</span></label>
        <div id="cp-options-wrap">
          <div class="option-row"><input class="form-input" type="text" placeholder="Option 1"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
          <div class="option-row"><input class="form-input" type="text" placeholder="Option 2"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
        </div>
        <button class="add-opt-btn" onclick="addOption()">+ Add Option</button>
      </div>
      <div class="form-group"><label class="form-label">Closes In</label>
        <select class="form-input" id="cp-duration" style="width:auto;">
          <option value="24">24 hours</option><option value="48" selected>48 hours</option>
          <option value="72">3 days</option><option value="168">1 week</option><option value="0">Never</option>
        </select></div>
      <div class="form-error" id="cp-error"></div>
      <button class="btn-main" onclick="submitUserPoll()" style="margin-top:8px;">📊 Create Poll</button>
    </div>
  </div>

  <div id="user-polls-list"><div class="state-box"><div class="spinner"></div><span>Loading…</span></div></div>

  <div class="polls-section-title">📌 Official Polls</div>
  <div id="custom-polls-list"><div class="state-box"><div class="spinner"></div><span>Loading polls…</span></div></div>
</div>

<footer class="site-footer" id="site-footer"></footer>
<script src="shared.js"></script>
<script src="app.js"></script>
<script>
const PIE_COLORS = ['#7c5cbf','#e67e22','#2e7d50','#c0392b','#1a76d2','#e91e63'];
let _allPolls = [];

renderHeader('polls');
renderFooter();
loadAndRenderPolls();

// Scroll to shared poll hash
window.addEventListener('load', () => {
  if (location.hash) {
    const pollId = location.hash.slice(1);
    setTimeout(() => {
      const el = document.getElementById('poll-' + pollId);
      if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('highlighted'); setTimeout(()=>el.classList.remove('highlighted'),3000); }
    }, 600);
  }
});

// Countdown ticker
let _pollTick = null;
function startPollCountdownTick() {
  if (_pollTick) return;
  _pollTick = setInterval(() => {
    document.querySelectorAll('.poll-cd[data-expires]').forEach(el => {
      const exp = parseInt(el.dataset.expires), left = exp - Date.now();
      if (left > 0) { el.textContent = '⏳ Closes in: ' + formatCountdown(left); el.style.color = 'var(--accent2)'; }
      else { el.textContent = '🔒 Poll closed'; el.style.color = 'var(--muted)'; }
    });
  }, 1000);
}

async function loadAndRenderPolls() {
  try {
    const res = await fetchPolls();
    if (res.status === 'ok') _allPolls = res.polls || [];
    else _allPolls = [];
  } catch(e) { _allPolls = []; }

  // Sort: most recently created first
  _allPolls.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  const now = Date.now();
  const sevenDaysAgo = now - 7*24*60*60*1000;

  // Filter: remove closed polls older than 7 days from public view
  const userPolls   = _allPolls.filter(p => p.type==='user'     && !(p.active===false && p.closedAt && p.closedAt < sevenDaysAgo));
  const officialPolls = _allPolls.filter(p => p.type==='official' && !(p.active===false && p.closedAt && p.closedAt < sevenDaysAgo));

  await renderPollList('user-polls-list', userPolls, 'user');
  await renderPollList('custom-polls-list', officialPolls, 'official');
  startPollCountdownTick();
}

async function renderPollList(containerId, polls, type) {
  const list = document.getElementById(containerId);
  if (!polls.length) {
    const msg = type==='user'
      ? `No community polls yet. ${currentUser ? 'Create one above!' : '<a href="login.html">Log in</a> to create the first poll!'}`
      : 'No official polls yet. Check back later!';
    list.innerHTML = `<div class="state-box" style="min-height:60px;font-size:13px;">${msg}</div>`;
    return;
  }

  // Fetch votes for all polls in parallel
  const voterKey = getVoterKey();
  const voteResults = await Promise.all(
    polls.map(p => fetchAllPollVotes(p.id).catch(()=>({status:'ok',votes:{},myVote:null})))
  );

  list.innerHTML = polls.map((poll,i) => buildPollCard(poll, voteResults[i], voterKey)).join('');
}

function buildPollCard(poll, voteData, voterKey) {
  const votes = voteData?.votes || {};
  const myVote = voteData?.myVote ?? null;
  const totals = poll.options.map((_,i) => parseInt(votes[String(i)]||0));
  const total = totals.reduce((a,b)=>a+b,0);
  const pct = v => total>0 ? Math.round((v/total)*100) : 0;
  const now = Date.now();
  const isActive = poll.active !== false && (!poll.expiresAt || now < poll.expiresAt);
  const isClosed = !isActive;
  const alreadyVoted = myVote !== null && myVote !== undefined;

  const closedBadge = isClosed ? `<span class="poll-closed-badge">🔒 Closed</span>` : '';
  const cdAttr = poll.expiresAt && isActive ? `data-expires="${poll.expiresAt}"` : '';
  const cdText = poll.expiresAt && isActive ? `⏳ Closes in: ${formatCountdown(poll.expiresAt - now)}` : (isClosed ? '🔒 Poll closed' : '');

  const optsHTML = poll.options.map((opt,i) => `
    <div class="poll-option">
      <button class="poll-option-btn${myVote===String(i)?' voted':''}"
        onclick="voteOnPoll('${poll.id}','${poll.type||'user'}',${i})"
        ${isClosed?'disabled style="opacity:0.5;cursor:default;"':''}>${opt}</button>
      <div class="poll-bar-outer"><div class="poll-bar-inner" style="width:${pct(totals[i])}%;"></div></div>
      <span class="poll-pct">${pct(totals[i])}%</span>
      <span style="font-size:11px;color:var(--muted);width:28px;">${totals[i]}</span>
    </div>`).join('');

  // Pie chart for closed polls
  let pieHTML = '';
  if (isClosed && total > 0) {
    pieHTML = buildPieChart(poll.options, totals, total);
  }

  // Admin remark stamp
  let remarkHTML = '';
  if (poll.adminRemark) {
    const cls = poll.remarkType === 'accepted' ? 'remark-accepted' : 'remark-rejected';
    const emoji = poll.remarkType === 'accepted' ? '✅' : '❌';
    remarkHTML = `<div class="poll-remark-stamp ${cls}">${emoji} ${poll.remarkType?.toUpperCase()}</div>
    <div style="margin-top:10px;background:${poll.remarkType==='accepted'?'rgba(46,125,80,0.07)':'rgba(192,57,43,0.06)'};border:1px solid ${poll.remarkType==='accepted'?'rgba(46,125,80,0.2)':'rgba(192,57,43,0.15)'};border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted2);">
      <strong>${poll.remarkType==='accepted'?'✅ Accepted':'❌ Rejected'}:</strong> ${poll.adminRemark}
      <div style="font-size:10px;color:var(--muted);margin-top:2px;">— ${poll.remarkBy||'SITU Mess Committee'}</div>
    </div>`;
  }

  const alreadyVotedBanner = alreadyVoted && isActive
    ? `<div class="already-voted-note">✓ You have already responded to this poll</div>` : '';

  return `<div class="poll-card" id="poll-${poll.id}">
    ${poll.adminRemark ? `<div class="poll-remark-stamp ${poll.remarkType==='accepted'?'remark-accepted':'remark-rejected'}">${poll.remarkType==='accepted'?'✅ ACCEPTED':'❌ REJECTED'}</div>` : ''}
    <div class="poll-card-title">${poll.question}${closedBadge}</div>
    ${poll.desc ? `<div class="poll-card-sub">${poll.desc}</div>` : ''}
    ${alreadyVotedBanner}
    ${optsHTML}
    <div class="poll-card-footer">
      <span class="poll-total-note">${total} vote${total!==1?'s':''} · by <strong>${poll.createdBy||'Mess Committee'}</strong></span>
      <button class="poll-share-btn" onclick="sharePoll('${poll.id}','${poll.question.replace(/'/g,"\\'")}')">🔗 Share</button>
    </div>
    ${cdAttr ? `<div class="poll-countdown-label poll-cd" ${cdAttr}>${cdText}</div>` : (cdText ? `<div class="poll-countdown-label">${cdText}</div>` : '')}
    ${!currentUser ? '<div class="guest-vote-note">Voting as guest — one vote per browser per poll</div>' : ''}
    ${pieHTML}
    ${poll.adminRemark ? remarkHTML : ''}
  </div>`;
}

function buildPieChart(options, totals, total) {
  let cumulative = 0;
  const segments = totals.map((count, i) => {
    const pct = count / total;
    const startAngle = cumulative * 360;
    cumulative += pct;
    const endAngle = cumulative * 360;
    return { pct, startAngle, endAngle, color: PIE_COLORS[i % PIE_COLORS.length], label: options[i], count };
  }).filter(s => s.pct > 0);

  // SVG pie chart
  const r = 40, cx = 50, cy = 50;
  function polarToXY(angle, radius) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  }
  const svgPaths = segments.map((seg, i) => {
    const start = polarToXY(seg.startAngle, r);
    const end   = polarToXY(seg.endAngle, r);
    const largeArc = (seg.endAngle - seg.startAngle) > 180 ? 1 : 0;
    return `<path d="M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y} Z" fill="${seg.color}" opacity="0.85"/>`;
  }).join('');

  const legendHTML = segments.map((seg, i) =>
    `<div class="pie-leg-item"><div class="pie-leg-dot" style="background:${seg.color}"></div>${seg.label} (${Math.round(seg.pct*100)}%)</div>`
  ).join('');

  return `<div class="poll-pie-wrap">
    <div class="poll-pie-title">📊 Final Vote Distribution</div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <svg width="100" height="100" viewBox="0 0 100 100">${svgPaths}</svg>
      <div class="pie-legend">${legendHTML}</div>
    </div>
  </div>`;
}

async function voteOnPoll(pollId, pollType, optIdx) {
  const poll = _allPolls.find(p => p.id === pollId);
  if (!poll) return;
  if (poll.active === false) { showToast('This poll has been closed'); return; }
  if (poll.expiresAt && Date.now() > poll.expiresAt) { showToast('This poll has closed'); return; }

  const voterKey = getVoterKey();
  try {
    const res = await sheetPostWithResponse({ action:'votePoll', pollId, pollType, optIdx, voterKey });
    if (res && res.status === 'ok') showToast('✅ Vote recorded!');
  } catch(e) {
    showToast('Vote saved locally — will sync when online');
  }
  await loadAndRenderPolls();
}

function sharePoll(pollId, question) {
  const url = window.location.origin + window.location.pathname + '#' + pollId;
  if (navigator.share) { navigator.share({title:question,text:'Vote on this poll 📊',url}).catch(()=>{}); }
  else { navigator.clipboard.writeText(url).then(()=>showToast('🔗 Poll link copied!')).catch(()=>prompt('Copy this link:',url)); }
}

function toggleCreateForm() {
  if (!currentUser) { showToast('Log in to create polls'); return; }
  const body=document.getElementById('create-poll-body'), card=document.getElementById('create-poll-card');
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  card.classList.toggle('open',!isOpen);
}

let optCount = 2;
function addOption() {
  if (optCount>=6){showToast('Maximum 6 options allowed');return;}
  const wrap=document.getElementById('cp-options-wrap');
  const row=document.createElement('div'); row.className='option-row';
  row.innerHTML=`<input class="form-input" type="text" placeholder="Option ${optCount+1}"><button class="remove-opt-btn" onclick="removeOption(this)">×</button>`;
  wrap.appendChild(row); optCount++;
}
function removeOption(btn) {
  const rows=document.querySelectorAll('#cp-options-wrap .option-row');
  if(rows.length<=2){showToast('Minimum 2 options required');return;}
  btn.parentElement.remove();
}

async function submitUserPoll() {
  if (!currentUser) { showToast('Log in to create polls'); return; }
  const question=document.getElementById('cp-question').value.trim();
  const desc=document.getElementById('cp-desc').value.trim();
  const errEl=document.getElementById('cp-error'); errEl.classList.remove('show');
  const options=Array.from(document.querySelectorAll('#cp-options-wrap input[type=text]')).map(i=>i.value.trim()).filter(Boolean);
  if(!question){errEl.textContent='Please enter a question.';errEl.classList.add('show');return;}
  if(options.length<2){errEl.textContent='Please enter at least 2 options.';errEl.classList.add('show');return;}
  const durHrs=parseInt(document.getElementById('cp-duration').value);
  const expiresAt=durHrs>0?new Date(Date.now()+durHrs*3600000).toISOString():'';
  const poll = {
    pollId:'u_'+Date.now(), type:'user', question, desc, options,
    createdBy: currentUser.isAnon?currentUser.codeName:currentUser.name,
    createdByEmail: currentUser.email,
    createdAt: new Date().toISOString(), expiresAt,
  };
  await sheetPost({ action:'addPoll', ...poll });
  document.getElementById('cp-question').value=''; document.getElementById('cp-desc').value='';
  document.getElementById('cp-options-wrap').innerHTML=`
    <div class="option-row"><input class="form-input" type="text" placeholder="Option 1"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
    <div class="option-row"><input class="form-input" type="text" placeholder="Option 2"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>`;
  optCount=2;
  document.getElementById('create-poll-body').style.display='none';
  document.getElementById('create-poll-card').classList.remove('open');
  showToast('✅ Poll created!');
  await loadAndRenderPolls();
}
</script>
</body>
</html>
