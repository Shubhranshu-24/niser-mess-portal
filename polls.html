<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polls — NISER Mess Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.polls-wrap { flex:1; padding:24px; max-width:860px; margin:0 auto; width:100%; }
.poll-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow); transition:box-shadow 0.2s; }
.poll-card.highlighted { box-shadow:0 0 0 3px var(--accent2), var(--shadow2); }
.poll-card-title { font-size:15px; font-weight:800; margin-bottom:4px; }
.poll-card-sub { font-size:12px; color:var(--muted2); margin-bottom:14px; }
.poll-option { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.poll-option-btn { flex-shrink:0; background:var(--bg3); border:1.5px solid var(--border2); border-radius:7px; padding:7px 14px; font-size:13px; font-weight:700; color:var(--muted2); cursor:pointer; transition:all 0.15s; min-width:100px; }
.poll-option-btn:hover { border-color:var(--accent2); color:var(--accent2); }
.poll-option-btn.voted { background:var(--accent2); color:#fff; border-color:var(--accent2); }
.poll-bar-outer { flex:1; height:18px; background:var(--bg3); border-radius:5px; overflow:hidden; }
.poll-bar-inner { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width 0.5s; border-radius:5px; }
.poll-pct { font-size:11px; font-weight:700; color:var(--muted2); width:36px; text-align:right; }
.poll-total-note { font-size:11px; color:var(--muted); margin-top:4px; }
.poll-min-votes-note { font-size:11px; color:var(--accent); font-weight:700; margin-top:4px; }
.poll-card-footer { display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
.polls-section-title { font-size:18px; font-weight:800; margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.poll-share-btn { background:none; border:1.5px solid var(--border2); border-radius:7px; padding:4px 10px; font-size:11px; font-weight:700; color:var(--muted2); cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:4px; font-family:inherit; }
.poll-share-btn:hover { border-color:var(--accent2); color:var(--accent2); }
.create-poll-card { background:var(--bg2); border:2px dashed var(--border2); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
.create-poll-card.open { border-style:solid; border-color:var(--accent2); }
.create-poll-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.create-poll-toggle { background:var(--accent2); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; }
.create-poll-body { margin-top:18px; }
.option-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.option-row input { flex:1; }
.remove-opt-btn { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; }
.add-opt-btn { background:var(--bg3); border:1.5px solid var(--border2); border-radius:7px; padding:6px 14px; font-size:12px; font-weight:700; color:var(--muted2); cursor:pointer; margin-top:4px; }
.add-opt-btn:hover { border-color:var(--accent2); color:var(--accent2); }
.poll-countdown-label { font-size:11px; color:var(--accent2); font-weight:700; margin-top:6px; }
.poll-closed-badge { font-size:10px; background:rgba(192,57,43,0.1); color:var(--red); padding:2px 8px; border-radius:5px; font-weight:700; margin-left:8px; }
.food-poll-badge { font-size:10px; background:rgba(46,125,80,0.1); color:var(--green); padding:2px 8px; border-radius:5px; font-weight:700; margin-left:6px; }
.guest-vote-note { font-size:10px; color:var(--muted); font-style:italic; margin-top:4px; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<header class="site-header" id="site-header"></header>

<div class="section-hero">
  <h1>📊 Community Polls</h1>
  <p>Vote on menu items and mess-related polls. No login needed to vote!</p>
</div>

<div class="polls-wrap">

  <!-- Community polls -->
  <div class="polls-section-title">
    ✏️ Community Polls
    <span style="font-size:12px;color:var(--muted2);font-weight:500;">(created by students)</span>
    <button onclick="loadAllPolls()" style="margin-left:auto;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">🔄 Refresh</button>
  </div>

  <div class="create-poll-card" id="create-poll-card">
    <div class="create-poll-header" onclick="toggleCreateForm()">
      <div>
        <div style="font-size:14px;font-weight:800;">➕ Create a Poll</div>
        <div style="font-size:12px;color:var(--muted2);margin-top:2px;">Ask the community anything about the mess!</div>
      </div>
      <button class="create-poll-toggle">Create Poll</button>
    </div>
    <div class="create-poll-body" id="create-poll-body" style="display:none;">
      <div class="form-group">
        <label class="form-label">Question *</label>
        <input class="form-input" type="text" id="cp-question" placeholder="e.g. Should the mess add more South Indian items?">
      </div>
      <div class="form-group">
        <label class="form-label">Description <span style="color:var(--muted);font-size:10px;">(optional)</span></label>
        <input class="form-input" type="text" id="cp-desc" placeholder="Add more context…">
      </div>
      <div class="form-group">
        <label class="form-label">Options * <span style="color:var(--muted);font-size:10px;">(2–6 options)</span></label>
        <div id="cp-options-wrap">
          <div class="option-row"><input class="form-input" type="text" placeholder="Option 1"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
          <div class="option-row"><input class="form-input" type="text" placeholder="Option 2"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
        </div>
        <button class="add-opt-btn" onclick="addOption()">+ Add Option</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Closes On (date &amp; time) <span style="color:var(--muted);font-size:10px;">(optional)</span></label>
          <input class="form-input" type="datetime-local" id="cp-expires">
        </div>
        <div class="form-group">
          <label class="form-label">Min Votes to Accept <span style="color:var(--muted);font-size:10px;">(0 = no minimum)</span></label>
          <input class="form-input" type="number" id="cp-minvotes" min="0" placeholder="e.g. 20" value="0">
        </div>
      </div>
      <div class="form-error" id="cp-error"></div>
      <button class="btn-main" onclick="submitUserPoll()" style="margin-top:8px;">📊 Create Poll</button>
    </div>
  </div>

  <div id="user-polls-list">
    <div class="state-box" style="min-height:80px;"><div class="spinner"></div><span>Loading…</span></div>
  </div>

  <!-- Official polls -->
  <div class="polls-section-title">📌 Official Polls</div>
  <div id="official-polls-list">
    <div class="state-box" style="min-height:80px;"><div class="spinner"></div><span>Loading…</span></div>
  </div>

  <!-- Food item polls -->
  <div class="polls-section-title">🍽 Food Item Polls</div>
  <div id="food-polls-list">
    <div class="state-box" style="min-height:80px;"><div class="spinner"></div><span>Loading…</span></div>
  </div>

</div>

<footer class="site-footer" id="site-footer"></footer>

<script src="shared.js"></script>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvsERH7D8w8hAE7TlU0gyF5izS0zqNrUPfLYLD2D6BkXjsXf0-1rUWv8y3Mgx3nFX8/exec';

renderHeader('polls');
renderFooter();

// ── Load all poll data from sheets ────────────────
function loadAllPolls() {
  let pending = 4;
  const done = () => { pending--; if (pending <= 0) { renderUserPolls(); renderOfficialPolls(); renderFoodPolls(); startPollCountdownTick(); } };

  fetchFromSheet('userPolls',    rows => { if (rows) mergeSheetUserPolls(rows);     done(); });
  fetchFromSheet('officialPolls',rows => { if (rows) mergeSheetOfficialPolls(rows); done(); });
  fetchFromSheet('foodPolls',    rows => { if (rows) mergeSheetFoodPolls(rows);     done(); });
  fetchFromSheet('pollVotes',    rows => { if (rows) mergeSheetPollVotes(rows);     done(); });
}
loadAllPolls();

// Scroll to shared poll (URL hash)
window.addEventListener('load', () => {
  if (location.hash) {
    const pollId = location.hash.slice(1);
    setTimeout(() => {
      const el = document.getElementById('poll-' + pollId);
      if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); el.classList.add('highlighted'); setTimeout(()=>el.classList.remove('highlighted'), 3000); }
    }, 600);
  }
});

// ── Countdown ticker ──────────────────────────────
let _pollTick = null;
function startPollCountdownTick() {
  if (_pollTick) return;
  _pollTick = setInterval(() => {
    document.querySelectorAll('.poll-cd[data-expires]').forEach(el => {
      const left = parseInt(el.dataset.expires) - Date.now();
      if (left > 0) { el.textContent = '⏳ Closes in: ' + formatCountdown(left); el.style.color='var(--accent2)'; }
      else { el.textContent='🔒 Poll closed'; el.style.color='var(--muted)'; }
    });
  }, 1000);
}

function formatCountdown(ms) {
  if (ms <= 0) return 'Closed';
  const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000), s=Math.floor((ms%60000)/1000);
  const p=n=>String(n).padStart(2,'0');
  return h>=24?`${Math.floor(h/24)}d ${p(h%24)}h ${p(m)}m`:`${p(h)}h ${p(m)}m ${p(s)}s`;
}

// ── Share poll ────────────────────────────────────
function sharePoll(pollId, question) {
  const url = window.location.origin + window.location.pathname + '#' + pollId;
  if (navigator.share) navigator.share({ title:question, text:'Vote on this poll 📊', url }).catch(()=>{});
  else navigator.clipboard.writeText(url).then(()=>showToast('🔗 Poll link copied!')).catch(()=>prompt('Copy this link:', url));
}

// ── Create poll form ──────────────────────────────
function toggleCreateForm() {
  if (!currentUser) { showToast('Log in to create polls'); return; }
  const body = document.getElementById('create-poll-body');
  const card = document.getElementById('create-poll-card');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  card.classList.toggle('open', !isOpen);
}

let optCount = 2;
function addOption() {
  if (optCount >= 6) { showToast('Maximum 6 options'); return; }
  const wrap = document.getElementById('cp-options-wrap');
  const row = document.createElement('div'); row.className='option-row';
  row.innerHTML=`<input class="form-input" type="text" placeholder="Option ${optCount+1}"><button class="remove-opt-btn" onclick="removeOption(this)">×</button>`;
  wrap.appendChild(row); optCount++;
}
function removeOption(btn) {
  const rows = document.querySelectorAll('#cp-options-wrap .option-row');
  if (rows.length <= 2) { showToast('Minimum 2 options required'); return; }
  btn.parentElement.remove();
}

function submitUserPoll() {
  if (!currentUser) { showToast('Log in to create polls'); return; }
  const question = document.getElementById('cp-question').value.trim();
  const desc     = document.getElementById('cp-desc').value.trim();
  const errEl    = document.getElementById('cp-error'); errEl.classList.remove('show');
  const options  = Array.from(document.querySelectorAll('#cp-options-wrap input[type=text]')).map(i=>i.value.trim()).filter(Boolean);
  if (!question) { errEl.textContent='Please enter a question.'; errEl.classList.add('show'); return; }
  if (options.length<2) { errEl.textContent='Please enter at least 2 options.'; errEl.classList.add('show'); return; }

  const expiresRaw = document.getElementById('cp-expires').value;
  const expiresAt  = expiresRaw ? new Date(expiresRaw).getTime() : null;
  const minVotes   = parseInt(document.getElementById('cp-minvotes').value) || 0;

  const poll = {
    id: 'u_' + Date.now(),
    question, desc, options,
    createdBy: currentUser.isAnon ? currentUser.codeName : currentUser.name,
    createdByEmail: currentUser.email,
    createdAt: new Date().toISOString(),
    expiresAt, minVotes,
    active: true, type:'user',
  };

  const userPolls = DB.getUserPolls();
  userPolls.unshift(poll);
  DB.setUserPolls(userPolls);
  pushPoll('addUserPoll', poll);

  // Reset form
  document.getElementById('cp-question').value='';
  document.getElementById('cp-desc').value='';
  document.getElementById('cp-options-wrap').innerHTML=`
    <div class="option-row"><input class="form-input" type="text" placeholder="Option 1"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>
    <div class="option-row"><input class="form-input" type="text" placeholder="Option 2"><button class="remove-opt-btn" onclick="removeOption(this)">×</button></div>`;
  document.getElementById('cp-expires').value='';
  document.getElementById('cp-minvotes').value='0';
  optCount=2;
  document.getElementById('create-poll-body').style.display='none';
  document.getElementById('create-poll-card').classList.remove('open');
  showToast('✅ Poll created!');
  renderUserPolls();
}

function pushPoll(action, poll) {
  if (!APPS_SCRIPT_URL) return;
  fetch(APPS_SCRIPT_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({
      action, pollId:poll.id,
      question:poll.question, desc:poll.desc||'',
      options:Array.isArray(poll.options)?poll.options:poll.options,
      createdBy:poll.createdBy||'', createdByEmail:poll.createdByEmail||'',
      minVotes:poll.minVotes||0,
      expiresAt:poll.expiresAt?new Date(poll.expiresAt).toISOString():'',
      createdAt:poll.createdAt||new Date().toISOString(),
    })
  }).catch(()=>{});
}

// ── Render helpers ────────────────────────────────
function getPollVoteTotals(pollId, pollType, optCount) {
  const votes = DB.getPollVotes();
  const totals = Array(optCount).fill(0);
  Object.keys(votes).forEach(k => {
    // key format: voterKey::pollType::pollId
    if (k.endsWith('::'+pollType+'::'+pollId)) {
      const idx = parseInt(votes[k]);
      if (!isNaN(idx) && idx < optCount) totals[idx]++;
    }
    // legacy format from user polls: voterKey::user::pollId
    if (pollType==='user' && k.endsWith('::user::'+pollId)) {
      const idx = parseInt(votes[k]);
      if (!isNaN(idx) && idx < optCount) totals[idx]++;
    }
  });
  return totals;
}

function getMyVote(pollId, pollType) {
  const votes = DB.getPollVotes();
  const voterKey = getVoterKey();
  return votes[voterKey+'::'+pollType+'::'+pollId] ?? votes[voterKey+'::user::'+pollId] ?? null;
}

function buildPollCard(poll, pollType) {
  const totals  = getPollVoteTotals(poll.id, pollType, poll.options.length);
  const total   = totals.reduce((a,b)=>a+b,0);
  const myVote  = getMyVote(poll.id, pollType);
  const pct     = v => total>0?Math.round((v/total)*100):0;
  const now     = Date.now();
  const isActive= poll.active!==false && (!poll.expiresAt || now<poll.expiresAt);
  const minMet  = !poll.minVotes || total >= poll.minVotes;
  const closedBadge = !isActive ? `<span class="poll-closed-badge">🔒 Closed</span>` : '';
  const foodBadge   = pollType==='food' ? `<span class="food-poll-badge">🍽 Food Poll</span>` : '';

  const optsHTML = poll.options.map((opt,i)=>`
    <div class="poll-option">
      <button class="poll-option-btn${myVote===String(i)?' voted':''}"
        onclick="castVote('${poll.id}','${pollType}',${i},'${poll.question.replace(/'/g,"\\'")}')"
        ${!isActive?'disabled style="opacity:0.5;cursor:default;"':''}>
        ${opt}
      </button>
      <div class="poll-bar-outer"><div class="poll-bar-inner" style="width:${pct(totals[i])}%;"></div></div>
      <span class="poll-pct">${pct(totals[i])}%</span>
      <span style="font-size:11px;color:var(--muted);width:28px;">${totals[i]}</span>
    </div>`).join('');

  const cdAttr = poll.expiresAt&&isActive?`data-expires="${poll.expiresAt}"`:'';
  const cdText = poll.expiresAt&&isActive?`⏳ Closes in: ${formatCountdown(poll.expiresAt-now)}`:(!isActive?'🔒 Poll closed':'');
  const minNote = poll.minVotes ? `<div class="poll-min-votes-note">${minMet?'✅':'⏳'} Minimum votes required: ${poll.minVotes} (${total} received${minMet?' — threshold met':' — not yet reached'})</div>` : '';
  const byLine  = poll.createdBy ? `· by <strong>${poll.createdBy}</strong>` : (pollType==='official'?'· Official Poll':'');

  return `<div class="poll-card" id="poll-${poll.id}">
    <div class="poll-card-title">${poll.question}${closedBadge}${foodBadge}</div>
    ${poll.desc?`<div class="poll-card-sub">${poll.desc}</div>`:''}
    ${poll.foodItem?`<div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:10px;">🍽 Food Item: ${poll.foodItem}</div>`:''}
    ${optsHTML}
    <div class="poll-card-footer">
      <span class="poll-total-note">${total} vote${total!==1?'s':''} ${byLine}</span>
      <button class="poll-share-btn" onclick="sharePoll('${poll.id}','${poll.question.replace(/'/g,"\\'")}')">🔗 Share</button>
    </div>
    ${minNote}
    ${cdText?`<div class="poll-countdown-label poll-cd" ${cdAttr}>${cdText}</div>`:''}
    ${!currentUser?'<div class="guest-vote-note">Voting as guest — one vote per browser per poll</div>':''}
  </div>`;
}

function castVote(pollId, pollType, optIdx, question) {
  // Check poll is still active
  const allPolls = pollType==='user'?DB.getUserPolls():pollType==='official'?DB.getOfficialPolls():DB.getFoodPolls();
  const poll = allPolls.find(p=>p.id===pollId);
  if (!poll) return;
  if (poll.active===false) { showToast('This poll has been closed'); return; }
  if (poll.expiresAt && Date.now()>poll.expiresAt) { showToast('This poll has expired'); return; }

  const votes   = DB.getPollVotes();
  const voterKey= getVoterKey();
  const myKey   = voterKey+'::'+pollType+'::'+pollId;
  const prev    = votes[myKey];
  if (prev===String(optIdx)) delete votes[myKey];
  else votes[myKey] = String(optIdx);
  DB.setPollVotes(votes);

  // Push vote to sheet
  if (APPS_SCRIPT_URL) {
    const option = poll.options[optIdx]||'';
    // Push to unified poll votes sheet
    fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({ action:'addPollVote', pollId, pollType, optIdx, voterKey:getVoterKey(), })
    }).catch(()=>{});
    // Also push to user poll votes sheet for user polls (backward compat)
    if (pollType==='user') {
      fetch(APPS_SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({ action:'addUserPollVote', pollId, question, option, optIdx, voterKey:getVoterKey(), date:new Date().toISOString() })
      }).catch(()=>{});
    }
  }

  // Re-render relevant section
  if (pollType==='user')     renderUserPolls();
  if (pollType==='official') renderOfficialPolls();
  if (pollType==='food')     renderFoodPolls();
}

// ── Render sections ───────────────────────────────
function renderUserPolls() {
  const list   = document.getElementById('user-polls-list');
  const polls  = DB.getUserPolls().filter(p=>p.active!==false);
  if (!polls.length) {
    list.innerHTML=`<div class="state-box" style="min-height:60px;font-size:13px;">No community polls yet. ${currentUser?'Create one above!':'<a href="login.html">Log in</a> to create the first poll!'}</div>`;
    return;
  }
  list.innerHTML = polls.map(p=>buildPollCard(p,'user')).join('');
}

function renderOfficialPolls() {
  const list  = document.getElementById('official-polls-list');
  const polls = DB.getOfficialPolls().filter(p=>p.active!==false);
  if (!polls.length) { list.innerHTML='<div class="state-box" style="min-height:60px;font-size:13px;">No official polls yet.</div>'; return; }
  list.innerHTML = polls.map(p=>buildPollCard(p,'official')).join('');
}

function renderFoodPolls() {
  const list  = document.getElementById('food-polls-list');
  const polls = DB.getFoodPolls().filter(p=>p.active!==false);
  if (!polls.length) { list.innerHTML='<div class="state-box" style="min-height:60px;font-size:13px;">No food polls yet. Admins can create them from the Admin panel.</div>'; return; }
  list.innerHTML = polls.map(p=>buildPollCard(p,'food')).join('');
}
</script>
</body>
</html>
