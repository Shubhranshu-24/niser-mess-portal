<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updates & Notifications — NISER Mess Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.updates-wrap{flex:1;padding:24px;max-width:800px;margin:0 auto;width:100%;}
.update-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);animation:fadeUp 0.3s ease both;position:relative;overflow:hidden;}
.update-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.update-card.type-announcement::before{background:var(--accent2);}
.update-card.type-resolved::before{background:var(--green);}
.update-card.type-improvement::before{background:var(--accent);}
.update-card.type-notice::before{background:var(--muted);}
.update-card.type-alert::before{background:var(--red);}
.update-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.update-type-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:0.06em;text-transform:uppercase;}
.type-announcement .update-type-badge{background:rgba(124,92,191,0.12);color:var(--accent2);}
.type-resolved .update-type-badge{background:rgba(46,125,80,0.12);color:var(--green);}
.type-improvement .update-type-badge{background:rgba(181,135,58,0.12);color:var(--accent);}
.type-notice .update-type-badge{background:var(--bg3);color:var(--muted);}
.type-alert .update-type-badge{background:rgba(192,57,43,0.12);color:var(--red);}
.update-title{font-size:15px;font-weight:800;}
.update-body{font-size:13px;color:var(--muted2);line-height:1.6;margin-top:6px;}
.update-date{font-size:11px;color:var(--muted);margin-top:8px;}
.update-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.upd-filter-btn{background:var(--bg3);border:1.5px solid transparent;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted2);cursor:pointer;transition:all 0.15s;}
.upd-filter-btn.active{background:var(--text);color:#fff;}
.upd-filter-btn:hover{background:var(--bg4);color:var(--text);}
.empty-updates{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header class="site-header" id="site-header"></header>

<div class="section-hero">
  <h1>🔔 Updates & Notifications</h1>
  <p>Latest news, resolved issues, improvements, and announcements from the Mess Committee.</p>
</div>

<div class="updates-wrap">
  <div class="update-filters" id="update-filters">
    <button class="upd-filter-btn active" onclick="setUpdateFilter(this,'all')">All</button>
    <button class="upd-filter-btn" onclick="setUpdateFilter(this,'announcement')">📢 Announcements</button>
    <button class="upd-filter-btn" onclick="setUpdateFilter(this,'resolved')">✅ Resolved</button>
    <button class="upd-filter-btn" onclick="setUpdateFilter(this,'improvement')">🔧 Improvements</button>
    <button class="upd-filter-btn" onclick="setUpdateFilter(this,'alert')">🚨 Alerts</button>
    <button class="upd-filter-btn" onclick="setUpdateFilter(this,'notice')">📋 Notices</button>
  </div>
  <div id="updates-list"><div class="state-box"><div class="spinner"></div><span>Loading updates…</span></div></div>
</div>

<footer class="site-footer" id="site-footer"></footer>
<script src="shared.js"></script>
<script>
let activeUpdateFilter = 'all', _allUpdates = [];
renderHeader('updates');
renderFooter();
loadUpdates();

async function loadUpdates() {
  try {
    const res = await fetchUpdates();
    _allUpdates = res.status==='ok' ? res.updates : [];
    // Add demo if empty
    if (!_allUpdates.length) {
      _allUpdates = [{id:'demo1',type:'announcement',title:'NISER Mess Portal Launched!',body:'Welcome to the new NISER Mess Portal. You can now rate food, submit complaints, vote on menu items, and stay updated. Your feedback helps improve the mess for everyone.',date:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),ts:Date.now(),postedBy:'SITU Mess Committee'}];
    }
  } catch(e) { _allUpdates = []; }
  renderUpdates();
}

function setUpdateFilter(btn, filter) {
  document.querySelectorAll('.upd-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeUpdateFilter=filter; renderUpdates();
}

function renderUpdates() {
  const list = document.getElementById('updates-list');
  let updates = [..._allUpdates].sort((a,b)=>(b.ts||0)-(a.ts||0));
  if (activeUpdateFilter !== 'all') updates = updates.filter(u=>u.type===activeUpdateFilter);
  if (!updates.length) { list.innerHTML='<div class="empty-updates">🔔 No updates in this category yet.</div>'; return; }

  const typeLabels = {announcement:'📢 Announcement',resolved:'✅ Resolved',improvement:'🔧 Improvement',alert:'🚨 Alert',notice:'📋 Notice'};
  list.innerHTML = updates.map((u,i) => `
    <div class="update-card type-${u.type||'notice'}" style="animation-delay:${i*0.04}s;">
      <div class="update-header">
        <span class="update-type-badge">${typeLabels[u.type]||u.type}</span>
        ${u.relatedComplaint?`<span style="font-size:11px;background:rgba(124,92,191,0.08);color:var(--accent2);padding:2px 8px;border-radius:5px;font-weight:700;">Re: complaint #${u.relatedComplaint}</span>`:''}
      </div>
      <div class="update-title">${u.title}</div>
      <div class="update-body">${u.body}</div>
      <div class="update-date">Posted by <strong>${u.postedBy||'Mess Committee'}</strong> · ${u.date}</div>
    </div>`).join('');
}
</script>
</body>
</html>
